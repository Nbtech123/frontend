<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="NB Tech Solutions hero illustration">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2540" stop-opacity=".10"/>
      <stop offset="1" stop-color="#2EC4B6" stop-opacity=".22"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7A00" stop-opacity=".22"/>
      <stop offset="1" stop-color="#2EC4B6" stop-opacity=".18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#0A2540" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="44" fill="url(#g1)"/>

  <!-- abstract background -->
  <circle cx="250" cy="130" r="160" fill="#2EC4B6" fill-opacity=".16"/>
  <circle cx="1020" cy="130" r="190" fill="#FF7A00" fill-opacity=".14"/>
  <circle cx="960" cy="620" r="220" fill="#0A2540" fill-opacity=".08"/>

  <!-- device panel -->
  <g filter="url(#shadow)">
    <rect x="120" y="120" width="960" height="480" rx="34" fill="#fff" fill-opacity=".88" stroke="#0A2540" stroke-opacity=".10"/>
  </g>

  <!-- left: camera tile -->
  <g transform="translate(190 210)">
    <rect x="0" y="0" width="420" height="300" rx="28" fill="url(#g2)" stroke="#0A2540" stroke-opacity=".10"/>
    <rect x="34" y="34" width="240" height="18" rx="9" fill="#0A2540" fill-opacity=".12"/>
    <rect x="34" y="64" width="190" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>

    <!-- CCTV glyph -->
    <g transform="translate(76 110)">
      <rect x="0" y="0" width="180" height="110" rx="26" fill="#fff" fill-opacity=".78" stroke="#0A2540" stroke-opacity=".10"/>
      <circle cx="70" cy="55" r="26" fill="#2EC4B6" fill-opacity=".26" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3"/>
      <circle cx="70" cy="55" r="12" fill="#0A2540" fill-opacity=".65"/>
      <rect x="112" y="36" width="44" height="38" rx="14" fill="#FF7A00" fill-opacity=".22"/>
      <path d="M180 55h64" stroke="#0A2540" stroke-opacity=".30" stroke-width="8" stroke-linecap="round"/>
      <path d="M216 55v78" stroke="#0A2540" stroke-opacity=".22" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- right: network tile -->
  <g transform="translate(650 210)">
    <rect x="0" y="0" width="360" height="300" rx="28" fill="#fff" fill-opacity=".84" stroke="#0A2540" stroke-opacity=".10"/>
    <rect x="28" y="34" width="220" height="18" rx="9" fill="#0A2540" fill-opacity=".12"/>
    <rect x="28" y="64" width="170" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>

    <!-- nodes -->
    <g transform="translate(60 118)" fill="none" stroke="#0A2540" stroke-opacity=".24" stroke-width="8" stroke-linecap="round">
      <path d="M70 60h120M130 60v110M130 170h-80M130 170h120M250 170v70"/>
    </g>
    <g transform="translate(60 118)">
      <circle cx="70" cy="60" r="22" fill="#2EC4B6" fill-opacity=".25" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3"/>
      <circle cx="190" cy="60" r="22" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="130" cy="170" r="24" fill="#FF7A00" fill-opacity=".20" stroke="#FF7A00" stroke-opacity=".38" stroke-width="3"/>
      <circle cx="50" cy="170" r="18" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="250" cy="170" r="18" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="250" cy="240" r="22" fill="#2EC4B6" fill-opacity=".18" stroke="#2EC4B6" stroke-opacity=".42" stroke-width="3"/>
    </g>
  </g>
</svg>

