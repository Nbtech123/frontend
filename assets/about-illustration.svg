<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="About NB Tech Solutions illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2EC4B6" stop-opacity=".16"/>
      <stop offset="1" stop-color="#0A2540" stop-opacity=".10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0A2540" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="64" width="520" height="232" rx="24" fill="#fff" fill-opacity=".86" stroke="#0A2540" stroke-opacity=".10"/>
    <rect x="610" y="64" width="520" height="232" rx="24" fill="#fff" fill-opacity=".86" stroke="#0A2540" stroke-opacity=".10"/>
  </g>

  <!-- left: checklist -->
  <g transform="translate(120 112)">
    <rect x="0" y="0" width="420" height="22" rx="11" fill="#0A2540" fill-opacity=".12"/>
    <g transform="translate(0 54)">
      <g fill="#2EC4B6" fill-opacity=".22" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3">
        <rect x="0" y="0" width="24" height="24" rx="8"/>
        <rect x="0" y="44" width="24" height="24" rx="8"/>
        <rect x="0" y="88" width="24" height="24" rx="8"/>
      </g>
      <g fill="#0A2540" fill-opacity=".10">
        <rect x="40" y="4" width="340" height="16" rx="8"/>
        <rect x="40" y="48" width="300" height="16" rx="8"/>
        <rect x="40" y="92" width="320" height="16" rx="8"/>
      </g>
    </g>
  </g>

  <!-- right: shield + network -->
  <g transform="translate(700 110)">
    <path d="M130 0 40 38v58c0 70 54 122 90 134 36-12 90-64 90-134V38L130 0Z"
      fill="#FF7A00" fill-opacity=".18" stroke="#FF7A00" stroke-opacity=".35" stroke-width="4" />
    <path d="M130 54v110" stroke="#0A2540" stroke-opacity=".22" stroke-width="10" stroke-linecap="round"/>
    <path d="M86 108h88" stroke="#0A2540" stroke-opacity=".22" stroke-width="10" stroke-linecap="round"/>
    <g transform="translate(260 26)" fill="none" stroke="#0A2540" stroke-opacity=".22" stroke-width="8" stroke-linecap="round">
      <path d="M0 70h120M60 70v92M60 162h-52M60 162h120"/>
    </g>
    <g transform="translate(260 26)">
      <circle cx="0" cy="70" r="18" fill="#2EC4B6" fill-opacity=".20" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3"/>
      <circle cx="120" cy="70" r="18" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="60" cy="162" r="20" fill="#FF7A00" fill-opacity=".18" stroke="#FF7A00" stroke-opacity=".35" stroke-width="3"/>
      <circle cx="8" cy="162" r="14" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="180" cy="162" r="14" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
    </g>
  </g>
</svg>

