<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-label="NB Tech Solutions services banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2540" stop-opacity=".10"/>
      <stop offset="0.55" stop-color="#2EC4B6" stop-opacity=".22"/>
      <stop offset="1" stop-color="#FF7A00" stop-opacity=".16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0A2540" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="34" fill="url(#bg)"/>

  <!-- accents -->
  <circle cx="260" cy="90" r="120" fill="#2EC4B6" fill-opacity=".18"/>
  <circle cx="1480" cy="90" r="140" fill="#FF7A00" fill-opacity=".14"/>
  <circle cx="1380" cy="380" r="160" fill="#0A2540" fill-opacity=".08"/>

  <!-- headline chips -->
  <g filter="url(#shadow)">
    <rect x="84" y="88" width="700" height="244" rx="26" fill="url(#card)" stroke="#0A2540" stroke-opacity=".10"/>
    <rect x="816" y="88" width="700" height="244" rx="26" fill="url(#card)" stroke="#0A2540" stroke-opacity=".10"/>
  </g>

  <!-- left: security -->
  <g transform="translate(136 132)">
    <rect x="0" y="0" width="320" height="20" rx="10" fill="#0A2540" fill-opacity=".12"/>
    <rect x="0" y="32" width="260" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>

    <!-- shield -->
    <g transform="translate(24 70)">
      <path d="M96 0 24 30v44c0 52 40 92 72 102 32-10 72-50 72-102V30L96 0Z"
        fill="#FF7A00" fill-opacity=".20" stroke="#FF7A00" stroke-opacity=".40" stroke-width="4" />
      <path d="M96 48v78" stroke="#0A2540" stroke-opacity=".22" stroke-width="10" stroke-linecap="round"/>
      <path d="M60 86h72" stroke="#0A2540" stroke-opacity=".22" stroke-width="10" stroke-linecap="round"/>
    </g>

    <!-- camera -->
    <g transform="translate(210 96)">
      <rect x="0" y="0" width="164" height="96" rx="22" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".12"/>
      <circle cx="60" cy="48" r="22" fill="#2EC4B6" fill-opacity=".26" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3"/>
      <circle cx="60" cy="48" r="10" fill="#0A2540" fill-opacity=".65"/>
      <rect x="98" y="30" width="38" height="36" rx="14" fill="#FF7A00" fill-opacity=".22"/>
    </g>
  </g>

  <!-- right: network -->
  <g transform="translate(868 132)">
    <rect x="0" y="0" width="320" height="20" rx="10" fill="#0A2540" fill-opacity=".12"/>
    <rect x="0" y="32" width="280" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>

    <!-- nodes + links -->
    <g transform="translate(24 70)" fill="none" stroke="#0A2540" stroke-opacity=".24" stroke-width="9" stroke-linecap="round">
      <path d="M70 62h150M145 62v110M145 172h-90M145 172h180M325 172v66"/>
    </g>
    <g transform="translate(24 70)">
      <circle cx="70" cy="62" r="22" fill="#2EC4B6" fill-opacity=".25" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3"/>
      <circle cx="220" cy="62" r="22" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="145" cy="172" r="24" fill="#FF7A00" fill-opacity=".20" stroke="#FF7A00" stroke-opacity=".38" stroke-width="3"/>
      <circle cx="55" cy="172" r="18" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="325" cy="172" r="18" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="325" cy="238" r="22" fill="#2EC4B6" fill-opacity=".18" stroke="#2EC4B6" stroke-opacity=".42" stroke-width="3"/>
    </g>

    <!-- wifi -->
    <g transform="translate(470 82)" fill="none" stroke="#0A2540" stroke-opacity=".22" stroke-width="9" stroke-linecap="round">
      <path d="M0 0c30-30 78-30 108 0"/>
      <path d="M18 20c20-20 52-20 72 0"/>
      <path d="M42 44c7-7 17-7 24 0"/>
    </g>
    <circle cx="566" cy="148" r="10" fill="#0A2540" fill-opacity=".55"/>
  </g>
</svg>

