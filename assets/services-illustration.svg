<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-label="Security and networking illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2EC4B6" stop-opacity=".22"/>
      <stop offset="1" stop-color="#FF7A00" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0A2540" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="640" rx="36" fill="url(#bg)"/>

  <!-- left card -->
  <g filter="url(#shadow)">
    <rect x="72" y="92" width="392" height="456" rx="28" fill="url(#panel)" stroke="#0A2540" stroke-opacity=".10"/>
    <rect x="108" y="132" width="320" height="22" rx="11" fill="#0A2540" fill-opacity=".10"/>
    <rect x="108" y="172" width="240" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>
    <rect x="108" y="202" width="280" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>

    <!-- CCTV camera glyph -->
    <g transform="translate(126 262)">
      <rect x="0" y="0" width="120" height="72" rx="18" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".12"/>
      <circle cx="46" cy="36" r="18" fill="#2EC4B6" fill-opacity=".25" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3"/>
      <circle cx="46" cy="36" r="8" fill="#0A2540" fill-opacity=".65"/>
      <rect x="74" y="22" width="26" height="28" rx="10" fill="#FF7A00" fill-opacity=".22"/>
      <path d="M120 36h48" stroke="#0A2540" stroke-opacity=".35" stroke-width="6" stroke-linecap="round"/>
      <path d="M150 36v54" stroke="#0A2540" stroke-opacity=".25" stroke-width="6" stroke-linecap="round"/>
    </g>

    <rect x="108" y="372" width="300" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>
    <rect x="108" y="402" width="250" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>
    <rect x="108" y="462" width="180" height="44" rx="16" fill="#FF7A00" fill-opacity=".22" stroke="#FF7A00" stroke-opacity=".35"/>
  </g>

  <!-- right diagram -->
  <g filter="url(#shadow)">
    <rect x="520" y="92" width="368" height="456" rx="28" fill="url(#panel)" stroke="#0A2540" stroke-opacity=".10"/>

    <!-- network nodes -->
    <g transform="translate(560 160)" fill="none" stroke="#0A2540" stroke-opacity=".28" stroke-width="6" stroke-linecap="round">
      <path d="M70 80h120M130 80v140M130 220h-90M130 220h120M250 220v90"/>
    </g>
    <g transform="translate(560 160)">
      <circle cx="70" cy="80" r="22" fill="#2EC4B6" fill-opacity=".26" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3"/>
      <circle cx="190" cy="80" r="22" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="130" cy="220" r="24" fill="#FF7A00" fill-opacity=".20" stroke="#FF7A00" stroke-opacity=".38" stroke-width="3"/>
      <circle cx="40" cy="220" r="18" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="250" cy="220" r="18" fill="#0A2540" fill-opacity=".08" stroke="#0A2540" stroke-opacity=".16" stroke-width="3"/>
      <circle cx="250" cy="310" r="22" fill="#2EC4B6" fill-opacity=".18" stroke="#2EC4B6" stroke-opacity=".42" stroke-width="3"/>
    </g>

    <!-- WiFi arcs -->
    <g transform="translate(690 430)" fill="none" stroke="#0A2540" stroke-opacity=".26" stroke-width="6" stroke-linecap="round">
      <path d="M0 0c26-26 68-26 94 0"/>
      <path d="M16 18c18-18 46-18 64 0"/>
      <path d="M36 38c7-7 15-7 22 0"/>
    </g>
    <circle cx="737" cy="478" r="8" fill="#0A2540" fill-opacity=".55"/>
  </g>
</svg>

