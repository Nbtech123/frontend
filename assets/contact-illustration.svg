<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-label="Contact and location illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2540" stop-opacity=".10"/>
      <stop offset="1" stop-color="#2EC4B6" stop-opacity=".18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0A2540" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="960" height="320" rx="24" fill="url(#bg)"/>

  <!-- map card -->
  <g filter="url(#shadow)">
    <rect x="64" y="56" width="520" height="208" rx="22" fill="#fff" fill-opacity=".86" stroke="#0A2540" stroke-opacity=".10"/>
  </g>
  <g transform="translate(90 82)" stroke="#0A2540" stroke-opacity=".20" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M0 40c70-50 150-50 220 0s150 50 220 0"/>
    <path d="M0 110c70-50 150-50 220 0s150 50 220 0"/>
  </g>
  <g transform="translate(316 94)">
    <path d="M88 0c-40 0-72 32-72 72 0 58 72 132 72 132s72-74 72-132C160 32 128 0 88 0Z"
      fill="#FF7A00" fill-opacity=".22" stroke="#FF7A00" stroke-opacity=".40" stroke-width="4"/>
    <circle cx="88" cy="72" r="26" fill="#2EC4B6" fill-opacity=".22" stroke="#2EC4B6" stroke-opacity=".5" stroke-width="3"/>
  </g>

  <!-- contact card -->
  <g filter="url(#shadow)">
    <rect x="616" y="56" width="280" height="208" rx="22" fill="#fff" fill-opacity=".86" stroke="#0A2540" stroke-opacity=".10"/>
  </g>
  <g transform="translate(650 92)">
    <rect x="0" y="0" width="210" height="18" rx="9" fill="#0A2540" fill-opacity=".12"/>
    <rect x="0" y="34" width="170" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>
    <rect x="0" y="60" width="190" height="14" rx="7" fill="#0A2540" fill-opacity=".10"/>
    <rect x="0" y="98" width="140" height="40" rx="16" fill="#2EC4B6" fill-opacity=".20" stroke="#2EC4B6" stroke-opacity=".45"/>
    <g transform="translate(170 84)" fill="none" stroke="#0A2540" stroke-opacity=".24" stroke-width="7" stroke-linecap="round">
      <path d="M12 18c18-18 46-18 64 0"/>
      <path d="M24 32c12-12 32-12 44 0"/>
      <path d="M44 48c4-4 8-4 12 0"/>
    </g>
  </g>
</svg>

